name: Build BenLinux Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget cpio unzip rsync bc \
          python3 libncurses-dev device-tree-compiler file sed make binutils \
          patch gzip bzip2 perl tar findutils bash gcc g++ lz4

    - name: Cache Buildroot downloads
      uses: actions/cache@v4
      with:
        path: buildroot/dl
        key: buildroot-dl-2025.02.10-benlinux-v1
        restore-keys: |
          buildroot-dl-2025.02.10-

    - name: Clone Buildroot
      run: |
        if [ ! -f "buildroot/Makefile" ]; then
          rm -rf buildroot
          git clone --depth 1 --branch 2025.02.10 https://github.com/buildroot/buildroot.git
        fi

    - name: Apply BenLinux configuration
      run: |
        cp configs/benlinux_defconfig buildroot/configs/benlinux_defconfig
        mkdir -p buildroot/board/benlinux
        cp benlinux_kernel.cfg buildroot/board/benlinux/benlinux_kernel.cfg
        cd buildroot
        make benlinux_defconfig
        echo "=== Config summary ==="
        grep "BR2_LINUX_KERNEL_DEFCONFIG\|BR2_LINUX_KERNEL_CONFIG_FRAGMENT\|BR2_TOOLCHAIN_BUILDROOT" .config | head -10

    - name: Download and extract kernel
      run: |
        cd buildroot
        make linux-source
        make linux-extract
        
    - name: Apply kernel modifications
      run: |
        cd buildroot
        REPO_ROOT="$(cd .. && pwd)"
        LINUX_DIR=$(ls -d output/build/linux-*/ | head -1)
        echo "Linux source: $LINUX_DIR"

        # ==================================================
        # PATCH 1: timex.h — CSR time instead of CLINT MMIO
        # ==================================================
        TIMEX="${LINUX_DIR}/arch/riscv/include/asm/timex.h"
        echo "=== Patching timex.h ==="
        sed -i '/extern u64 __iomem \*clint_time_val;/d' "$TIMEX"
        sed -i 's|return readl_relaxed(((u32 \*)clint_time_val));|return csr_read(CSR_TIME);|' "$TIMEX"
        sed -i 's|return readl_relaxed(((u32 \*)clint_time_val) + 1);|return csr_read(CSR_TIMEH);|' "$TIMEX"
        sed -i 's|hi = get_cycles_hi();|hi = csr_read(CSR_TIMEH);|' "$TIMEX"
        sed -i 's|lo = get_cycles();|lo = csr_read(CSR_TIME);|' "$TIMEX"
        sed -i 's|} while (hi != get_cycles_hi());|} while (hi != csr_read(CSR_TIMEH));|' "$TIMEX"
        if grep -q "csr_read(CSR_TIME)" "$TIMEX"; then
          echo "OK: timex.h patched"
        else
          echo "FATAL: timex.h patch failed!"
          sed -n '/CONFIG_RISCV_M_MODE/,/^#else/p' "$TIMEX"
          exit 1
        fi

        # ==================================================
        # PATCH 2: irq-riscv-intc.c — CLIC mcause 12-bit mask
        # ==================================================
        INTC="${LINUX_DIR}/drivers/irqchip/irq-riscv-intc.c"
        echo "=== Patching irq-riscv-intc.c ==="
        sed -i 's|regs->cause & ~CAUSE_IRQ_FLAG|regs->cause \& 0xFFF|' "$INTC"
        if grep -q "0xFFF" "$INTC"; then
          echo "OK: irq-riscv-intc.c patched"
        else
          echo "FATAL: irq-riscv-intc.c patch failed!"
          grep -n "cause" "$INTC" | head -10
          exit 1
        fi

        # ==================================================
        # PATCH 3: Kconfig — PAGE_OFFSET for PSRAM at 0x48200000
        # ==================================================
        KCONFIG_RISCV="${LINUX_DIR}/arch/riscv/Kconfig"
        echo "=== Patching PAGE_OFFSET ==="
        sed -i 's|default 0x80000000 if !MMU && RISCV_M_MODE|default 0x48200000 if !MMU \&\& RISCV_M_MODE|' "$KCONFIG_RISCV"
        if grep -q "0x48200000 if !MMU" "$KCONFIG_RISCV"; then
          echo "OK: PAGE_OFFSET patched to 0x48200000"
        else
          echo "FATAL: PAGE_OFFSET patch failed!"
          grep -A5 "config PAGE_OFFSET" "$KCONFIG_RISCV"
          exit 1
        fi

        # ==================================================
        # ADD: timer-esp32p4.c + Kconfig + Makefile
        # ==================================================
        echo "=== Adding timer driver ==="
        cp "${REPO_ROOT}/timer-esp32p4.c" "${LINUX_DIR}/drivers/clocksource/"
        echo "OK: timer-esp32p4.c copied"
        KCONFIG="${LINUX_DIR}/drivers/clocksource/Kconfig"
        if ! grep -q "ESP32P4_TIMER" "$KCONFIG"; then
          echo ''                                                              >> "$KCONFIG"
          echo 'config ESP32P4_TIMER'                                          >> "$KCONFIG"
          printf '\tbool "ESP32-P4 BenVisor timer driver"\n'                   >> "$KCONFIG"
          printf '\tdepends on RISCV && RISCV_M_MODE\n'                        >> "$KCONFIG"
          printf '\thelp\n'                                                    >> "$KCONFIG"
          printf '\t  Timer driver for ESP32-P4 running under BenVisor.\n'     >> "$KCONFIG"
          printf '\t  Select this instead of CLINT_TIMER for ESP32-P4.\n'      >> "$KCONFIG"
          echo "OK: Kconfig entry added"
        fi
        MAKEFILE="${LINUX_DIR}/drivers/clocksource/Makefile"
        if ! grep -q "timer-esp32p4" "$MAKEFILE"; then
          echo 'obj-$(CONFIG_ESP32P4_TIMER)	+= timer-esp32p4.o' >> "$MAKEFILE"
          echo "OK: Makefile entry added"
        fi

        # ==================================================
        # ADD: benvisor-console.c — IPC ring buffer console
        # ==================================================
        echo "=== Adding console driver ==="
        cp "${REPO_ROOT}/benvisor-console.c" "${LINUX_DIR}/drivers/tty/serial/"
        if ! grep -q "BENVISOR_CONSOLE" "${LINUX_DIR}/drivers/tty/serial/Kconfig"; then
          echo ''                                                                >> "${LINUX_DIR}/drivers/tty/serial/Kconfig"
          echo 'config BENVISOR_CONSOLE'                                         >> "${LINUX_DIR}/drivers/tty/serial/Kconfig"
          printf '\tbool "BenVisor IPC console"\n'                               >> "${LINUX_DIR}/drivers/tty/serial/Kconfig"
          printf '\tdepends on RISCV\n'                                          >> "${LINUX_DIR}/drivers/tty/serial/Kconfig"
          printf '\tselect SERIAL_CORE\n'                                        >> "${LINUX_DIR}/drivers/tty/serial/Kconfig"
          printf '\tselect SERIAL_EARLYCON\n'                                    >> "${LINUX_DIR}/drivers/tty/serial/Kconfig"
          printf '\thelp\n'                                                      >> "${LINUX_DIR}/drivers/tty/serial/Kconfig"
          printf '\t  Console via shared SRAM ring buffer to BenOS.\n'           >> "${LINUX_DIR}/drivers/tty/serial/Kconfig"
          echo "OK: Console Kconfig added"
        fi
        if ! grep -q "benvisor-console" "${LINUX_DIR}/drivers/tty/serial/Makefile"; then
          echo 'obj-$(CONFIG_BENVISOR_CONSOLE) += benvisor-console.o' >> "${LINUX_DIR}/drivers/tty/serial/Makefile"
          echo "OK: Console Makefile added"
        fi

        # ==================================================
        # PATCH 5: Boot breadcrumbs — ROM UART at key points
        # ==================================================
        echo "=== Adding boot breadcrumbs ==="
        HEAD_S="${LINUX_DIR}/arch/riscv/kernel/head.S"
        MAIN_C="${LINUX_DIR}/init/main.c"

        cat > /tmp/add_breadcrumbs.py << 'BREADCRUMB_EOF'
        import sys
        ROM_PUTC = '0x4FC00054'
        def asm_breadcrumb(char_hex, indent='\t', save_a0=False):
            lines = [f'{indent}/* BenLinux breadcrumb: {char_hex} */\n']
            if save_a0:
                lines.append(f'{indent}csrw 0x340, a0\n')
            lines.append(f'{indent}li a0, {char_hex}\n')
            lines.append(f'{indent}li t0, {ROM_PUTC}\n')
            lines.append(f'{indent}jalr ra, t0, 0\n')
            if save_a0:
                lines.append(f'{indent}csrr a0, 0x340\n')
            return ''.join(lines)
        head_s = sys.argv[1]
        main_c = sys.argv[2]
        with open(head_s, 'r') as f:
            lines = f.readlines()
        out = []
        did = {k: False for k in ['0','1','2','3','4','5','7','8','9','H']}
        for i, line in enumerate(lines):
            s = line.strip()
            indent = line[:len(line) - len(line.lstrip())] or '\t'
            if not did['0'] and s == 'csrw CSR_IE, zero':
                out.append(asm_breadcrumb('0x30', indent))
                did['0'] = True
            out.append(line)
            if not did['1'] and s == 'fence.i':
                out.append(asm_breadcrumb('0x31', indent))
                did['1'] = True
            elif not did['2'] and s == 'call reset_regs':
                out.append(asm_breadcrumb('0x32', indent))
                did['2'] = True
            elif not did['3'] and s == '.Lpmp_done:':
                out.append(asm_breadcrumb('0x33', indent))
                did['3'] = True
            elif not did['4'] and s == 'load_global_pointer':
                out.append(asm_breadcrumb('0x34', indent, save_a0=True))
                did['4'] = True
            elif not did['5'] and s == '.Lclear_bss_done:':
                out.append(asm_breadcrumb('0x35', indent, save_a0=True))
                did['5'] = True
            elif not did['7'] and s == 'call setup_vm':
                out.append(asm_breadcrumb('0x37', indent))
                did['7'] = True
            elif not did['8'] and did['7'] and s == 'call .Lsetup_trap_vector':
                out.append(asm_breadcrumb('0x38', indent))
                did['8'] = True
            elif not did['9'] and s == 'call soc_early_init':
                out.append(asm_breadcrumb('0x39', indent))
                did['9'] = True
            elif not did['H'] and s == 'tail start_kernel':
                out.pop()
                out.append(asm_breadcrumb('0x48', indent))
                out.append(line)
                did['H'] = True
        with open(head_s, 'w') as f:
            f.writelines(out)
        for k, v in did.items():
            print(f'  head.S breadcrumb {k}: {"OK" if v else "MISS"}')
        with open(main_c, 'r') as f:
            content = f.read()
        rom_call = f'((int(*)(unsigned char)){ROM_PUTC})'
        k_done = i_done = e_done = False
        if '\tchar *command_line;' in content:
            content = content.replace(
                '\tchar *command_line;',
                f'\t{rom_call}(0x4B); /* K */\n\tchar *command_line;', 1)
            k_done = True
        if '\tlocal_irq_disable();\n' in content:
            content = content.replace(
                '\tlocal_irq_disable();\n',
                f'\tlocal_irq_disable();\n\t{rom_call}(0x49); /* I */\n', 1)
            i_done = True
        if '\tlocal_irq_enable();' in content:
            content = content.replace(
                '\tlocal_irq_enable();',
                f'\t{rom_call}(0x45); /* E */\n\tlocal_irq_enable();', 1)
            e_done = True
        with open(main_c, 'w') as f:
            f.write(content)
        print(f'OK: init/main.c breadcrumbs: K={k_done} I={i_done} E={e_done}')
        BREADCRUMB_EOF

        python3 /tmp/add_breadcrumbs.py "$HEAD_S" "$MAIN_C"

        echo "=== All kernel modifications applied ==="

    - name: Build kernel and rootfs
      run: |
        cd buildroot
        make -j$(nproc)

        # LZ4 initramfs fix
        LINUX_DIR=$(ls -d output/build/linux-*/ | head -1)
        KCONFIG="${LINUX_DIR}/.config"
        if ! grep -q "CONFIG_INITRAMFS_COMPRESSION_LZ4=y" "$KCONFIG"; then
          echo "=== Fixing initramfs compression: forcing LZ4 ==="
          PRE_SIZE=$(stat -c%s output/images/Image 2>/dev/null || echo 0)
          sed -i 's/^CONFIG_INITRAMFS_COMPRESSION_.*=y/# &/' "$KCONFIG"
          sed -i '/CONFIG_INITRAMFS_COMPRESSION_LZ4/d' "$KCONFIG"
          echo "CONFIG_INITRAMFS_COMPRESSION_LZ4=y" >> "$KCONFIG"
          rm -f "${LINUX_DIR}/usr/initramfs_inc_data"
          rm -f "${LINUX_DIR}/usr/initramfs_data.o"
          rm -f "${LINUX_DIR}/usr/built-in.a"
          rm -f "${LINUX_DIR}/usr/.initramfs_inc_data.cmd"
          make -C "${LINUX_DIR}" ARCH=riscv olddefconfig
          make linux-rebuild -j$(nproc)
          POST_SIZE=$(stat -c%s output/images/Image 2>/dev/null || echo 0)
          echo "Image: ${PRE_SIZE} -> ${POST_SIZE} bytes"
        else
          echo "=== LZ4 already active ==="
        fi

    - name: Verify kernel configuration
      run: |
        echo "=== Verifying BenLinux kernel config ==="
        LINUX_DIR=$(ls -d buildroot/output/build/linux-*/ | head -1)
        CONFIG="${LINUX_DIR}/.config"
        FAIL=0

        KVER=$(basename "$LINUX_DIR" | sed 's/linux-//')
        echo "Kernel version: $KVER"

        if grep -q "# CONFIG_MMU is not set" "$CONFIG"; then
          echo "OK: NOMMU mode"
        else
          echo "FATAL: MMU should not be set"; FAIL=1
        fi

        if grep -q "CONFIG_RISCV_M_MODE=y" "$CONFIG"; then
          echo "OK: M-mode"
        else
          echo "FATAL: M-mode not set"; FAIL=1
        fi

        if grep -q "CONFIG_RISCV_SBI=y" "$CONFIG"; then
          echo "FATAL: SBI enabled (impossible with M-mode)"; FAIL=1
        else
          echo "OK: SBI disabled"
        fi

        if grep -q "CONFIG_ESP32P4_TIMER=y" "$CONFIG"; then
          echo "OK: ESP32P4_TIMER enabled"
        else
          echo "WARN: ESP32P4_TIMER not set"
        fi

        if grep -q "CONFIG_RISCV_ISA_C=y" "$CONFIG"; then
          echo "FATAL: Compressed instructions enabled"; FAIL=1
        else
          echo "OK: No compressed instructions"
        fi

        if grep -q 'CONFIG_PAGE_OFFSET=0x48200000' "$CONFIG"; then
          echo "OK: PAGE_OFFSET=0x48200000"
        else
          echo "FATAL: PAGE_OFFSET wrong"; grep PAGE_OFFSET "$CONFIG"; FAIL=1
        fi

        if grep -q "CONFIG_SERIAL_EARLYCON=y" "$CONFIG"; then
          echo "OK: SERIAL_EARLYCON enabled"
        else
          echo "FATAL: SERIAL_EARLYCON not set (earlycon driver will be dead code)"; FAIL=1
        fi

        if grep -q "CONFIG_BENVISOR_CONSOLE=y" "$CONFIG"; then
          echo "OK: BENVISOR_CONSOLE enabled"
        else
          echo "WARN: BENVISOR_CONSOLE not set"
        fi

        if grep -q "CONFIG_RISCV_BOOT_SPINWAIT=y" "$CONFIG"; then
          echo "FATAL: SPINWAIT enabled (amoadd.w may hang on PSRAM)"; FAIL=1
        else
          echo "OK: SPINWAIT disabled"
        fi

        echo "=== SMP/SPINWAIT/NR_CPUS status ==="
        grep -E "CONFIG_SMP|SPINWAIT|NR_CPUS" "$CONFIG" || echo "(none found)"

        if [ $FAIL -ne 0 ]; then
          echo "BUILD VERIFICATION FAILED"; exit 1
        fi

        # === Memory layout from System.map ===
        echo ""
        echo "=== Kernel Memory Layout (from System.map) ==="
        SYSMAP="${LINUX_DIR}/System.map"
        if [ -f "$SYSMAP" ]; then
          PAGE_OFF="0x48200000"
          echo "PAGE_OFFSET = $PAGE_OFF"
          echo ""
          for sym in _text _stext _etext _sdata _edata __bss_start __bss_stop _end __init_begin __init_end; do
            ADDR=$(grep " $sym\$" "$SYSMAP" | head -1 | awk '{print $1}')
            if [ -n "$ADDR" ]; then
              OFFSET=$((0x$ADDR - 0x48200000))
              OFFSET_MB=$(echo "scale=2; $OFFSET / 1048576" | bc)
              echo "  $sym = 0x$ADDR  (PAGE_OFFSET + ${OFFSET_MB}MB)"
            fi
          done
          echo ""
          BSS_STOP=$(grep " __bss_stop\$" "$SYSMAP" | head -1 | awk '{print $1}')
          END=$(grep " _end\$" "$SYSMAP" | head -1 | awk '{print $1}')
          if [ -n "$BSS_STOP" ]; then
            echo "*** DTB must be placed ABOVE 0x$BSS_STOP ***"
            BSS_OFF=$((0x$BSS_STOP - 0x48200000))
            BSS_MB=$(echo "scale=2; $BSS_OFF / 1048576" | bc)
            echo "*** BSS ends at PAGE_OFFSET + ${BSS_MB}MB ***"
            if [ $((0x$BSS_STOP)) -gt $((0x48A00000)) ]; then
              echo "*** WARNING: __bss_stop (0x$BSS_STOP) > old DTB addr (0x48A00000)! ***"
              echo "*** This confirms DTB was being wiped by BSS clear! ***"
            else
              echo "    __bss_stop is below old DTB addr (0x48A00000) — DTB was safe"
            fi
          fi
          if [ -n "$END" ]; then
            END_OFF=$((0x$END - 0x48200000))
            END_MB=$(echo "scale=2; $END_OFF / 1048576" | bc)
            echo "*** _end (total kernel footprint) = PAGE_OFFSET + ${END_MB}MB ***"
          fi
        else
          echo "WARN: System.map not found"
        fi

    - name: Verify Image
      run: |
        IMAGE="buildroot/output/images/Image"
        ls -la "$IMAGE"
        python3 -c "
        data = open('$IMAGE', 'rb').read()
        w = int.from_bytes(data[0:4], 'little')
        print(f'First word: 0x{w:08x}')
        print('32-bit insn' if w & 0x3 == 0x3 else 'WARNING: compressed')
        z = data.count(b'\x00')
        print(f'{len(data)-z:,} non-zero bytes of {len(data):,} total')
        "

    - name: Compress Image
      run: |
        gzip -k buildroot/output/images/Image

    - name: Upload kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: benlinux-kernel-image
        path: |
          buildroot/output/images/Image
          buildroot/output/images/Image.gz
        retention-days: 90
