# ============================================================
# BenLinux NOMMU Native Kernel Configuration Fragment
# ============================================================
# For running Linux DIRECTLY on ESP32-P4 HP Core 1.
# No emulator — bare metal, native 400MHz execution.
#
# Target hardware:
#   - ESP32-P4 HP Core 1 (RV32IMA, no S-mode, no C ext in kernel)
#   - M-mode execution (NOMMU, no Sv32)
#   - NO SBI (M-mode kernel accesses hardware directly)
#   - RAM: 16MB PSRAM at 0x48000000
#   - Timer: BenVisor systimer → CLIC int 7 injection
#   - Console: IPC ring buffer in SRAM → BenOS WebSocket
#
# Base kernel: Linux 6.12 LTS
# Buildroot: 2025.02.10 LTS
#
# Required kernel patches (see ESP32P4_KERNEL_PATCHES.md):
#   1. timex.h: get_cycles() uses CSR time (not CLINT MMIO)
#   2. irq-riscv-intc.c: mcause mask 0xFFF (CLIC-safe)
#   3. timer-esp32p4.c: custom clocksource + clock_event driver
# ============================================================

# === NOMMU MODE ===
# CONFIG_MMU is not set
CONFIG_RISCV_M_MODE=y



# === Architecture ===
CONFIG_SMP=n
# CONFIG_SMP is not set
CONFIG_RISCV_BOOT_SPINWAIT=n
# CONFIG_RISCV_BOOT_SPINWAIT is not set
CONFIG_NR_CPUS=1
CONFIG_FPU=n

# === CRITICAL: No compressed instructions ===
# P4 supports C extension but kernel code must use 4-byte
# instructions for predictable mepc advancement in trap handlers.
CONFIG_RISCV_ISA_C=n
# CONFIG_RISCV_ISA_C is not set

# === CRITICAL: No EFI stub ===
CONFIG_EFI=n
# CONFIG_EFI is not set

# === NO SBI ===
# SBI requires S-mode which the P4 doesn't have.
# Linux runs in M-mode and accesses hardware directly.
# CONFIG_RISCV_SBI is not set

# === Timer: Custom ESP32-P4 driver ===
# Reads CSR time (360 MHz) for clocksource.
# Writes mtimecmp to shared SRAM for clock events.
# BenVisor polls mtimecmp and injects CLIC int 7.
CONFIG_ESP32P4_TIMER=y
# CONFIG_CLINT_TIMER is not set

CONFIG_BENVISOR_CONSOLE=y
CONFIG_SERIAL_CORE=y
CONFIG_SERIAL_EARLYCON=y

# === Initramfs ===
CONFIG_BLK_DEV_INITRD=y

# === LZ4 initramfs ===
CONFIG_RD_LZ4=y
CONFIG_DECOMPRESS_LZ4=y
CONFIG_INITRAMFS_COMPRESSION_LZ4=y
# CONFIG_INITRAMFS_COMPRESSION_GZIP is not set
CONFIG_RD_GZIP=n

# === NOMMU: FLAT binary format (not ELF) ===
CONFIG_BINFMT_FLAT=y

# === Size: Compiler ===
CONFIG_CC_OPTIMIZE_FOR_SIZE=y
CONFIG_DEBUG_INFO_NONE=y

# === Size: Disable networking ===
CONFIG_NET=n

# === Size: Disable block layer ===
CONFIG_BLOCK=n

# === Size: No loadable modules ===
CONFIG_MODULES=n

# === Size: Small internal data structures ===
CONFIG_BASE_SMALL=1
CONFIG_LOG_BUF_SHIFT=12

# === Size: Strip debug/tracing ===
CONFIG_KALLSYMS=n
CONFIG_FTRACE=n
CONFIG_DEBUG_KERNEL=n
CONFIG_PROFILING=n
CONFIG_KPROBES=n
CONFIG_BPF_SYSCALL=n
CONFIG_PERF_EVENTS=n

# === Size: No crypto/security ===
CONFIG_CRYPTO=n
CONFIG_SECURITY=n
CONFIG_AUDIT=n

# === Size: No filesystems ===
CONFIG_EXT4_FS=n
CONFIG_EXT2_FS=n
CONFIG_XFS_FS=n
CONFIG_BTRFS_FS=n
CONFIG_VFAT_FS=n
CONFIG_MSDOS_FS=n
CONFIG_MISC_FILESYSTEMS=n
CONFIG_NETWORK_FILESYSTEMS=n
CONFIG_NFS_FS=n

# === Size: No unused subsystems ===
CONFIG_VGA_CONSOLE=n
CONFIG_SOUND=n
CONFIG_USB_SUPPORT=n
CONFIG_DRM=n
CONFIG_INPUT_MOUSE=n
CONFIG_INPUT_JOYSTICK=n
CONFIG_INPUT_TABLET=n
CONFIG_INPUT_TOUCHSCREEN=n
CONFIG_WLAN=n
CONFIG_WIRELESS=n
CONFIG_RFKILL=n
CONFIG_SWAP=n
CONFIG_SYSVIPC=n
CONFIG_POSIX_MQUEUE=n
CONFIG_CROSS_MEMORY_ATTACH=n
CONFIG_SECCOMP=n
CONFIG_STACKPROTECTOR=n
CONFIG_CGROUPS=n
CONFIG_COMPAT_BRK=n
CONFIG_USELIB=n
CONFIG_STRICT_KERNEL_RWX=n

# === Disabled hardware subsystems ===
CONFIG_VIRTUALIZATION=n
CONFIG_KVM=n
CONFIG_PCI=n
CONFIG_IOMMU_SUPPORT=n
CONFIG_HUGETLBFS=n
CONFIG_HUGETLB_PAGE=n
CONFIG_THERMAL=n
CONFIG_PM=n
CONFIG_SUSPEND=n
CONFIG_HIBERNATION=n
CONFIG_VGA_ARB=n
CONFIG_CPU_IDLE=n
CONFIG_DMADEVICES=n
CONFIG_DMA_ENGINE=n
CONFIG_PINCTRL=n
CONFIG_GPIOLIB=n
CONFIG_MEMORY_HOTPLUG=n
CONFIG_COMPACTION=n
CONFIG_MIGRATION=n
CONFIG_CMA=n
CONFIG_TRANSPARENT_HUGEPAGE=n
CONFIG_CLEANCACHE=n
CONFIG_FRONTSWAP=n
CONFIG_ZSWAP=n
CONFIG_ZPOOL=n
CONFIG_VIRTIO=n
CONFIG_VIRTIO_MENU=n
CONFIG_VHOST_MENU=n
CONFIG_HID=n
CONFIG_I2C=n
CONFIG_SPI=n
CONFIG_RTC_CLASS=n
CONFIG_WATCHDOG=n
CONFIG_HWMON=n
CONFIG_MTD=n
CONFIG_MEDIA_SUPPORT=n
CONFIG_FB=n
CONFIG_NEW_LEDS=n
CONFIG_EDAC=n
CONFIG_REGULATOR=n
